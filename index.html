<head>
  <meta charset="UTF-8">
  <title>Ultimate Online Scientific Calculator – Free & Interactive</title>
  <meta name="description" content="Use the Ultimate Online Calculator by Raheem Abdullahi: scientific functions, history of calculations, and offline download. Free, fast, and interactive.">
  <meta name="keywords" content="online calculator, scientific calculator, math tools, free calculator, interactive calculator, math education">
  <link rel="icon" type="image/png" href="favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* Body & Background */
    body {
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      margin:0;
      font-family: Arial, sans-serif;
      background: url('background.png') no-repeat center center fixed;
      background-size: cover;
      background-position: center;
    }

    /* Calculator container */
    .calculator-container {
      width:360px;
      padding:25px;
      border-radius:35px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      box-shadow: 0 15px 50px rgba(0,0,0,0.6);
      color:white;
      text-align:center;
      animation: fadeIn 1s ease;
    }

    @keyframes fadeIn {
      from { opacity:0; transform: translateY(-20px); }
      to { opacity:1; transform: translateY(0); }
    }

    /* Display */
    #display {
      width:100%; height:70px; font-size:32px; margin-bottom:15px;
      text-align:right; border-radius:15px; border:none; padding:10px;
      background: rgba(255,255,255,0.15); color:white;
      box-shadow: inset 0 -3px 6px rgba(0,0,0,0.2);
    }

    /* Buttons grid */
    .buttons {
      display:grid; grid-template-columns: repeat(4,1fr); gap:12px; margin-bottom:15px;
    }

    button {
      height:70px; font-size:20px; border:none; border-radius:20px;
      cursor:pointer; transition:0.2s; color:white; box-shadow:0 5px rgba(0,0,0,0.3);
      background:#333; position:relative; overflow:hidden;
    }

    button:active {
      transform: scale(0.95); box-shadow:0 0 20px rgba(255,255,255,0.7);
      background:#555;
    }

    button:hover {
      transform: scale(1.05); box-shadow:0 10px 20px rgba(0,0,0,0.5);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .number { background:#444; }
    .operator { background:#ff9500; }
    .special { background:#00c6ff; color:black; }
    .scientific { background:#7b2ff7; }

    /* Scientific hidden */
    #scientific {
      margin-top:10px; display:grid; grid-template-columns:repeat(4,1fr);
      gap:10px; max-height:0; overflow:hidden; transition:max-height 0.5s ease;
    }
    #scientific.show { max-height:600px; }

    /* History */
    #history {
      margin-top:15px; max-height:160px; overflow-y:auto;
      background: rgba(0,0,0,0.3); border-radius:12px; padding:10px;
      font-size:14px; text-align:left;
    }

    /* Download button */
    #download { margin-top:15px; text-align:center; }
    #download button {
      background:#00ff6a; color:black; width:220px; height:50px;
      font-size:16px; border-radius:12px; cursor:pointer;
    }
    #download button:hover { opacity:0.9; }

    #credit { text-align:center; font-size:12px; color:white; opacity:0.7; margin-top:10px; }
    #instructions { text-align:center; margin-top:10px; color:white; font-size:14px; }
  </style>
</head>
<body>
<div class="calculator-container">

<input type="text" id="display" disabled placeholder="0">

<!-- Buttons -->
<div class="buttons">
<button class="special" onclick="clearDisplay()">C</button>
<button class="special" onclick="backspace()">⌫</button>
<button class="operator" onclick="appendValue('/')">/</button>
<button class="operator" onclick="appendValue('*')">*</button>

<button class="number" onclick="appendValue('7')">7</button>
<button class="number" onclick="appendValue('8')">8</button>
<button class="number" onclick="appendValue('9')">9</button>
<button class="operator" onclick="appendValue('-')">-</button>

<button class="number" onclick="appendValue('4')">4</button>
<button class="number" onclick="appendValue('5')">5</button>
<button class="number" onclick="appendValue('6')">6</button>
<button class="operator" onclick="appendValue('+')">+</button>

<button class="number" onclick="appendValue('1')">1</button>
<button class="number" onclick="appendValue('2')">2</button>
<button class="number" onclick="appendValue('3')">3</button>
<button class="number" onclick="appendValue('0')">0</button>

<button class="special" onclick="calculate()">=</button>
<button class="special" onclick="toggleScientific()">🔬 More</button>
</div>

<!-- Scientific -->
<div id="scientific">
<button class="scientific" onclick="appendValue('Math.PI')">π</button>
<button class="scientific" onclick="appendValue('Math.E')">e</button>
<button class="scientific" onclick="appendValue('Math.sin(')">sin</button>
<button class="scientific" onclick="appendValue('Math.cos(')">cos</button>
<button class="scientific" onclick="appendValue('Math.tan(')">tan</button>
<button class="scientific" onclick="appendValue('Math.log10(')">log</button>
<button class="scientific" onclick="appendValue('Math.log(')">ln</button>
<button class="scientific" onclick="appendValue('Math.sqrt(')">√</button>
<button class="scientific" onclick="appendValue('**2')">x²</button>
<button class="scientific" onclick="factorial()">x!</button>
<button class="scientific" onclick="appendValue('%')">mod</button>
</div>

<!-- History -->
<div id="history"></div>

<!-- Centered Download -->
<div id="download">
<button onclick="downloadCalculator()">Download Calculator</button>
</div>

<!-- Instructions -->
<div id="instructions">
Click "More" to see scientific functions. History tracks calculations. Download for offline use.
</div>

<!-- Tiny credit -->
<div id="credit">Raheem Abdullahi</div>

</div>

<script>
function appendValue(val){ document.getElementById('display').value += val; }
function clearDisplay(){ document.getElementById('display').value = ''; }
function backspace(){ let d=document.getElementById('display'); d.value=d.value.slice(0,-1); }
function calculate(){
  let d=document.getElementById('display');
  try{ let r=eval(d.value); addHistory(d.value+" = "+r); d.value=r; } 
  catch{ d.value='Error'; }
}
function toggleScientific(){ document.getElementById('scientific').classList.toggle('show'); }
function factorial(){
  let d=document.getElementById('display');
  let num=parseInt(d.value); if(num<0){d.value='Error'; return;}
  let f=1; for(let i=1;i<=num;i++){ f*=i; }
  addHistory(d.value+"!"+" = "+f);
  d.value=f;
}
function addHistory(entry){
  let hist=document.getElementById('history');
  hist.innerHTML=entry+"<br>"+hist.innerHTML;
}
function downloadCalculator(){
  let content=document.documentElement.outerHTML;
  let blob=new Blob([content],{type:"text/html"});
  let url=URL.createObjectURL(blob);
  let a=document.createElement("a");
  a.href=url; a.download="Calculator.html";
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}
</script>
</body>
</html>
